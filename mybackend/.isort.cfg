[isort]
line_length = 100
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
lines_after_imports = 2
sections = FUTURE,STDLIB,THIRDPARTY,DJANGO,FIRSTPARTY,LOCALFOLDER
import_heading_stdlib = Standard library imports
import_heading_thirdparty = Third party imports
import_heading_django = Django imports
import_heading_firstparty = Local application imports
import_heading_localfolder = Local folder imports
known_django = django
known_first_party = myapp,myproject
skip = migrations,__pycache__,.git,.venv,venv
force_sort_within_sections = True
no_lines_before = LOCALE
# Explicitly exclude migrations directory
exclude = (
    '*/migrations/*',
    '.git',
    '__pycache__',
    '.venv',
    'venv'
)
