name: Notion Sync

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  issues:
    types: [opened, edited, closed, reopened]
  issue_comment:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      event-type:
        description: '동기화할 이벤트 유형 (선택사항)'
        required: false
        default: 'manual'

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # 전체 커밋 내역 가져오기
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install @notionhq/client @actions/github @actions/core
    
    - name: Sync GitHub events to Notion
      id: notion-sync
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: |
        node .github/scripts/notion-sync.js
    
    - name: Handle failure
      if: failure()
      run: |
        echo "Notion 동기화에 실패했습니다. 오류 메시지: ${{ steps.notion-sync.outcome == 'failure' && '오류 발생' || '알 수 없는 오류' }}"
        exit 1
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        node .github/scripts/notion-sync.js
