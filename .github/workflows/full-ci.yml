name: Full Stack CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'myfront/**'
      - 'mybackend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'myfront/**'
      - 'mybackend/**'
      - '.github/workflows/**'

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: myproject_user
          POSTGRES_PASSWORD: myproject_password
          POSTGRES_DB: myproject_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      DB_NAME: myproject_db
      DB_USER: myproject_user
      DB_PASSWORD: myproject_password
      DB_HOST: localhost
      DB_PORT: 5432
      SECRET_KEY: test-secret-key
      DEBUG: 'True'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mybackend/requirements.txt
        pip install black flake8 isort
    
    - name: Run Black
      run: |
        black --check mybackend/
    
    - name: Run isort
      run: |
        isort --check-only mybackend/
    
    - name: Run flake8
      run: |
        flake8 mybackend/
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'mybackend/requirements.txt'
    
    - name: Install dependencies
      working-directory: ./mybackend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov black==24.4.2
    
    - name: Run black
      working-directory: ./mybackend/..
      run: |
        black --check mybackend/
    
    - name: Run migrations
      working-directory: ./mybackend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        SECRET_KEY: test-secret-key
      run: |
        python manage.py check
        python manage.py migrate --no-input
    
    - name: Run tests
      working-directory: ./mybackend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        SECRET_KEY: test-secret-key
        DEBUG: 'True'
      run: |
        python -m pytest --cov=./ --cov-report=xml
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-coverage-report
        path: mybackend/coverage.xml
        retention-days: 7

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    needs: backend
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'myfront/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./myfront
      run: |
        npm ci --prefer-offline
        npm cache verify
    
    - name: Run linter
      working-directory: ./myfront
      run: npm run lint
    
    - name: Run tests
      working-directory: ./myfront
      run: |
        npm test -- --watchAll=false
        npm run test:coverage -- --coverage --watchAll=false
    
    - name: Build application
      working-directory: ./myfront
      run: npm run build
    
    - name: Upload test coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage-report
        path: |
          myfront/coverage/
          myfront/coverage/lcov-report/
        retention-days: 7
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: frontend-build
        path: |
          myfront/.next/**/*
          myfront/public/**/*
        retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Deployment placeholder
      run: |
        echo "Deployment steps will go here"
        echo "Backend and frontend have passed all tests!"
      working-directory: .
